SERIAL 0 115200
UI vesamenu.c32
INCLUDE boot/syslinux/archiso_head.cfg

LABEL 5k
TEXT HELP
Boot the 5K Linux live environment.
It will drop you into the TUI installer automatically.
ENDTEXT
MENU LABEL Boot 5K Linux (x86_64, BIOS)
LINUX boot/x86_64/vmlinuz-linux
INITRD boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%

LABEL existing
MENU LABEL Boot existing OS on first disk
COM32 chain.c32
APPEND hd0 0

LABEL memtest
MENU LABEL Run Memtest86+ (RAM test)
LINUX boot/memtest86+/memtest.bin

LABEL reboot
MENU LABEL Reboot
COM32 reboot.c32

LABEL poweroff
MENU LABEL Power Off
COM32 poweroff.c32
